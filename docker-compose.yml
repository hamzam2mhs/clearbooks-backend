services:
  postgres:
    image: postgres:15
    container_name: clearbooks-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: clearbooks_dev
      POSTGRES_USER: clearbooks
      POSTGRES_PASSWORD: clearbooks
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

